{% extends "base.html" %}
{% block title %}Log in - uilingo{% endblock %}

{% block content %}
<h1>uilingo</h1>

<div class="box">
  <h2>Log in</h2>
  <p class="hint">Enter your username and password.</p>

  <form method="post" action="{{ url_for('login') }}">
    <label>
      <span>Username</span>
      <input type="text" name="username" required autocomplete="username"
        value="{{ request.form.username or '' }}">
    </label>
    <label>
      <span>Password</span>
      <input type="password" name="password" required autocomplete="current-password">
    </label>
    <button type="submit">Log in</button>
  </form>

  <p class="footer-line">No account? <a href="{{ url_for('register') }}">Sign up</a></p>
</div>
{% endblock %}
