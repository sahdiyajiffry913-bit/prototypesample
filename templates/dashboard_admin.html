{% extends "base.html" %}
{% block title %}Admin - uilingo{% endblock %}

{% block content %}
<div class="dash-top">
  <h1>Admin dashboard</h1>
  <a href="{{ url_for('logout') }}">Log out</a>
</div>

<div class="box">
  <p>Hello, <strong>{{ username }}</strong>.</p>
  <p class="hint">Manage accounts and see who uses uilingo.</p>
  <form method="get" action="{{ url_for('admin_users') }}" class="inline-form">
    <button type="submit">View all users</button>
  </form>
</div>
{% endblock %}
